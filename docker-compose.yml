services:
  postgres:
    image: postgres:16-alpine
    container_name: estoquei-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: estoquei
      POSTGRES_PASSWORD: estoquei_dev
      POSTGRES_DB: estoquei
    volumes:
      - estoquei_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estoquei -d estoquei"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  estoquei_pg_data:
